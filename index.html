<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Group Maker</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-gray-900 via-gray-950 to-black text-white min-h-screen p-6">

<div class="max-w-6xl mx-auto">

<!-- HEADER -->
<h1 class="text-4xl font-bold text-center mb-2">⚽ Creador de grupos</h1>
<p class="text-center text-gray-400 mb-6">Simulador interactivo con clasificación automática</p>

<!-- TEAMS -->
<div class="bg-white/5 backdrop-blur-lg p-4 rounded-2xl shadow-lg border border-white/10 mb-6">
  <h2 class="text-xl font-semibold mb-3">✍️ Equipos</h2>

  <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
    <input id="t0" class="bg-black/40 p-2 rounded-lg text-center" value="Equipo A">
    <input id="t1" class="bg-black/40 p-2 rounded-lg text-center" value="Equipo B">
    <input id="t2" class="bg-black/40 p-2 rounded-lg text-center" value="Equipo C">
    <input id="t3" class="bg-black/40 p-2 rounded-lg text-center" value="Equipo D">
  </div>
</div>

<!-- MATCHES -->
<div class="bg-white/5 backdrop-blur-lg p-4 rounded-2xl border border-white/10 mb-6">
  <h2 class="text-xl font-semibold mb-3">⚽ Partidos</h2>
  <div id="matches" class="space-y-3"></div>
</div>

<button onclick="calcular()" 
class="w-full bg-green-500 hover:bg-green-600 transition transform hover:scale-[1.02] p-3 rounded-xl font-bold shadow-lg">
📊 Calcular Tabla
</button>

<!-- TABLE -->
<div class="bg-white/5 backdrop-blur-lg p-4 rounded-2xl border border-white/10 mt-6">
  <h2 class="text-xl font-semibold mb-3">🏆 Clasificación</h2>

  <table class="w-full text-center">
    <thead class="text-gray-300">
      <tr>
        <th>Equipo</th>
        <th>PTS</th>
        <th>GF</th>
        <th>GC</th>
        <th>DG</th>
        <th>Estado</th>
      </tr>
    </thead>
    <tbody id="tabla"></tbody>
  </table>
</div>

</div>

<script>

let partidos = [];

function generarPartidos() {

  let teams = ["t0","t1","t2","t3"].map(id => document.getElementById(id).value);

  partidos = [
    [0,1],[0,2],[0,3],
    [1,2],[1,3],
    [2,3]
  ];

  let html = "";

  partidos.forEach((p, i) => {

    html += `
    <div class="bg-black/40 p-3 rounded-xl border border-white/10 hover:scale-[1.01] transition duration-300">

      <div class="font-semibold mb-2">
        ${teams[p[0]]} <span class="text-gray-400">vs</span> ${teams[p[1]]}
      </div>

      <div class="grid grid-cols-3 md:grid-cols-6 gap-2">

        <input id="g${i}_a" placeholder="Goles ${teams[p[0]]}"
        class="bg-black/60 p-2 rounded-lg text-center">

        <input id="g${i}_b" placeholder="Goles ${teams[p[1]]}"
        class="bg-black/60 p-2 rounded-lg text-center">

        <input id="y${i}_a" placeholder="🟨"
        class="bg-black/60 p-2 rounded-lg text-center">

        <input id="y${i}_b" placeholder="🟨"
        class="bg-black/60 p-2 rounded-lg text-center">

        <input id="r${i}_a" placeholder="🟥"
        class="bg-black/60 p-2 rounded-lg text-center">

        <input id="r${i}_b" placeholder="🟥"
        class="bg-black/60 p-2 rounded-lg text-center">

      </div>

    </div>
    `;
  });

  document.getElementById("matches").innerHTML = html;
}

function calcular() {

  let teams = ["t0","t1","t2","t3"].map(id => document.getElementById(id).value);

  let stats = teams.map(t => ({
    name: t,
    pts: 0,
    gf: 0,
    gc: 0,
    dg: 0
  }));

  partidos.forEach((p, i) => {

    let ga = +document.getElementById(`g${i}_a`).value || 0;
    let gb = +document.getElementById(`g${i}_b`).value || 0;

    let A = p[0];
    let B = p[1];

    stats[A].gf += ga;
    stats[A].gc += gb;

    stats[B].gf += gb;
    stats[B].gc += ga;

    if (ga > gb) stats[A].pts += 3;
    else if (gb > ga) stats[B].pts += 3;
    else {
      stats[A].pts += 1;
      stats[B].pts += 1;
    }
  });

  stats.forEach(s => s.dg = s.gf - s.gc);

  stats.sort((a,b) =>
    b.pts - a.pts ||
    b.dg - a.dg ||
    b.gf - a.gf
  );

  let html = "";

  stats.forEach((s, i) => {

    let estado = "";

    if (i < 2) {
      estado = `<span class="text-green-400 font-bold animate-pulse">CLASIFICA</span>`;
    } else {
      estado = `<span class="text-red-400">ELIMINADO</span>`;
    }

    html += `
    <tr class="border-b border-white/10 hover:bg-white/5 transition">

      <td class="py-2 font-semibold ${i<2 ? 'text-green-300' : ''}">
        ${s.name}
      </td>

      <td>${s.pts}</td>
      <td>${s.gf}</td>
      <td>${s.gc}</td>
      <td>${s.dg}</td>
      <td>${estado}</td>

    </tr>
    `;
  });

  // animación fade simple
  document.getElementById("tabla").classList.add("opacity-0");

  setTimeout(() => {
    document.getElementById("tabla").innerHTML = html;
    document.getElementById("tabla").classList.remove("opacity-0");
    document.getElementById("tabla").classList.add("transition","duration-500","opacity-100");
  }, 150);
}

// actualizar partidos cuando cambian nombres
document.querySelectorAll("input").forEach(i => {
  i.addEventListener("input", generarPartidos);
});

generarPartidos();

</script>

</body>
</html>
